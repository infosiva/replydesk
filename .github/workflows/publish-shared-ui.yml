name: Publish @infosiva/shared-ui to GitHub Packages

on:
  push:
    tags:
      - 'shared-ui-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@infosiva'

      - name: Install deps
        run: npm install
        working-directory: shared-ui

      - name: Build
        run: npm run build
        working-directory: shared-ui

      - name: Publish
        run: npm publish
        working-directory: shared-ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
